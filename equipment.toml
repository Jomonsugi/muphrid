# ─────────────────────────────────────────────────────────────────────────────
# equipment.toml — User-maintained imaging equipment configuration
#
# This is the single source of truth for equipment-specific data that the
# agent needs to produce correct results. Values here override all other
# sources (env vars, FITS headers, etc.).
#
# Update this file when you change equipment. The agent reads it at the start
# of every session.
# ─────────────────────────────────────────────────────────────────────────────

[camera]
model = "Fujifilm X-T30 II"
pixel_size_um = 3.76            # sensor_width_mm / sensor_width_px
sensor_type = "xtrans"          # "bayer" | "xtrans" | "mono"

[optics]
# Primary imaging setup. Comment out entries you don't use.
focal_length_mm = 135.0         # Physical focal length of the lens (not EFL). Samyang 135mm f/2.
# aperture_mm = 50.0            # Primary aperture diameter (for Airy PSF)
# obstruction_pct = 0.0         # Central obstruction as % of aperture area

[location]
# Observatory / imaging site (used for SPCC atmospheric correction)
# latitude = 0.0                # Decimal degrees, positive = north
# longitude = 0.0               # Decimal degrees, positive = east
# elevation_m = 10              # Metres above sea level
