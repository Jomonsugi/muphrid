# ─────────────────────────────────────────────────────────────────────────────
# equipment.toml — Values that can't be read from file metadata
#
# DSLR/mirrorless RAW (.RAF, .CR2): pixel size and accurate focal length
# are NOT in EXIF — must be set here. X-Trans sensors also need sensor_type
# so Siril uses 3-pass demosaic (critical for X-Trans quality).
#
# Dedicated astro cameras (.FITS from ZWO, QHY): pixel size and focal length
# ARE in FITS headers. Nothing needed here — leave everything commented out.
# ─────────────────────────────────────────────────────────────────────────────

# ── Uncomment for Fuji X-T30 II + Samyang 135mm f/2 (.RAF files) ────────────

# [camera]
# pixel_size_um = 3.76
# sensor_type = "xtrans"          # Required for X-Trans 3-pass demosaic in Siril

# [optics]
# focal_length_mm = 129.5         # Plate-solve-measured. Samyang 135mm f/2.8 nominal.

# ── ZWO ASI 2600MC Pro (.FITS files) — nothing needed ───────────────────────
# All values read from FITS headers automatically.
