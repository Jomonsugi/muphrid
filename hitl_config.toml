# HITL (Human-in-the-Loop) Configuration
#
# Defines which pipeline steps pause for human review.
# Every phase-specific tool can be toggled for HITL — the human chooses
# where and when to get involved.
#
# autonomous = true    skip all HITL interrupts for unattended runs
# enabled = false      skip HITL for a specific tool only
#
# type = "data_review"    show metrics/stats, no image display required
# type = "image_review"   show current image(s), chat-based feedback
#
# CLI reads this file directly. The Gradio app shows these as defaults
# and overrides them at runtime via checkboxes.

autonomous = false
vlm_hitl = false         # when true, agent sees all images (base64) during HITL conversations
vlm_autonomous = false   # when true, agent can visually inspect images outside of HITL via present_images
vlm_retention_max_images = 8   # max images retained in agent view (excluding active HITL gate, which is always shown)

# ── Calibration ───────────────────────────────────────────────────────────────

[hitl.T02_masters]
enabled = false
type    = "data_review"
title   = "T02 Master Frame Diagnostics"

[hitl.T02b_convert]
enabled = false
type    = "data_review"
title   = "T02b Sequence Conversion"

[hitl.T03_calibrate]
